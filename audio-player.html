<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Audio Player</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #controls { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Custom Audio Player</h1>
    <audio id="audioPlayer" controls>
        <source src="your-audio-file.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <div id="controls">
        <button id="playBtn">Play</button>
        <button id="stopBtn">Stop</button>
    </div>
    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');

        playBtn.addEventListener('click', () => {
            audioPlayer.play();
            logEvent('Audio started playing.');
        });

        stopBtn.addEventListener('click', () => {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            logEvent('Audio stopped.');
        });

        // Web Audio API Tone Generator
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let oscillator;

        function startTone() {
            oscillator = audioContext.createOscillator();
            oscillator.type = 'sine'; // Type of wave
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime); // A4 note
            oscillator.connect(audioContext.destination);
            oscillator.start();
        }

        function stopTone() {
            if (oscillator) {
                oscillator.stop();
                logEvent('Tone stopped.');
            }
        }

        // Event Logger
        function logEvent(message) {
            console.log(new Date().toISOString() + ': ' + message);
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', (event) => {
            if (event.key === ' ') { // Spacebar to toggle play/pause
                if (audioPlayer.paused) {
                    audioPlayer.play();
                    logEvent('Audio started playing via keyboard.');
                } else {
                    audioPlayer.pause();
                    logEvent('Audio paused via keyboard.');
                }
            }
            if (event.key === 't') { // 't' key to start tone
                startTone();
                logEvent('Tone started via keyboard.');
            }
            if (event.key === 's') { // 's' key to stop tone
                stopTone();
            }
        });
    </script>
</body>
</html>
