<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations Example</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <h1>CSS Animations, Canvas, SVG, and Particle System</h1>

    <h2>CSS Animation</h2>
    <div style="width: 100px; height: 100px; background-color: red; animation: spin 2s infinite;"></div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <h2>Canvas Image Processing</h2>
    <canvas id="canvas" width="300" height="300"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = 'path_to_your_image.jpg';
        img.onload = () => {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            // Example: Apply grayscale filter
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < imageData.data.length; i += 4) {
                const avg = (imageData.data[i] + imageData.data[i + 1] + imageData.data[i + 2]) / 3;
                imageData.data[i] = avg; // Red
                imageData.data[i + 1] = avg; // Green
                imageData.data[i + 2] = avg; // Blue
            }
            ctx.putImageData(imageData, 0, 0);
        };
    </script>

    <h2>SVG Animation</h2>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" fill="yellow">
            <animate attributeName="r" from="40" to="20" dur="0.5s" begin="0s" repeatCount="indefinite" alternate="true" />
        </circle>
    </svg>

    <h2>Particle System</h2>
    <div id="particle-container" style="position: relative; width: 300px; height: 300px; overflow: hidden; border: 1px solid black;"></div>
    <script>
        const container = document.getElementById('particle-container');
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.width = '10px';
            particle.style.height = '10px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            container.appendChild(particle);

            let dx = (Math.random() - 0.5) * 2;
            let dy = (Math.random() - 0.5) * 2;
            function update() {
                const rect = particle.getBoundingClientRect();
                if (rect.left > window.innerWidth || rect.top > window.innerHeight) {
                    particle.remove();
                } else {
                    particle.style.left = (rect.left + dx) + 'px';
                    particle.style.top = (rect.top + dy) + 'px';
                    requestAnimationFrame(update);
                }
            }
            update();
        }
        setInterval(createParticle, 200);
    </script>
</body>
</html>
